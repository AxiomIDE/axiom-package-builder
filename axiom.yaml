name: axiom-official/axiom-package-builder
version: 0.1.0
language: python
description: Builds new Axiom packages from natural language goals using LLM-driven code generation. Implements a self-correcting loop — PackageErrorAnalyser sends fix instructions back to CodeGenerator until tests pass.
author: Axiom Official
license: MIT
nodes:
  - name: IntentClassifier
    input: AgentRequest
    output: PackageSpec
    description: Parses the user's goal and produces an initial PackageSpec skeleton with inferred node names, descriptions, and proto message stubs.
    required_secrets:
      - ANTHROPIC_API_KEY
  - name: PackageDesigner
    input: PackageSpec
    output: PackageSpec
    description: Expands the PackageSpec to include full proto message definitions and detailed node interface contracts, searching the marketplace for reusable packages first.
  - name: CodeGenerator
    input: PackageSpec
    output: PackageSpec
    description: Generates complete Python node implementations (source_code and test_code) for every NodeSpec in the PackageSpec using the LLM.
    required_secrets:
      - ANTHROPIC_API_KEY
  - name: Publisher
    input: PackageSpec
    output: PublishResult
    description: Creates a GitHub repo under AxiomIDE, commits all generated code, runs axiom publish, and returns a PublishResult.
  - name: PackageTester
    input: PublishResult
    output: TestResult
    description: Directly invokes each published node via POST /v1/nodes/<ulid> with synthetic test inputs and returns a TestResult with the execution_id for debug event streaming.
  - name: PackageErrorAnalyser
    input: TestResult
    output: AnalysisResult
    description: Reads the debug event stream for the test execution, diagnoses errors, and produces fix_instructions for CodeGenerator. Sets has_error=false when tests pass or only missing secrets remain.
    required_secrets:
      - ANTHROPIC_API_KEY
  - name: BuildResult
    input: AnalysisResult
    output: AgentProgress
    description: Terminal node. Converts the final AnalysisResult into an AgentProgress with stage=complete/error. Returns the published package_name on success.
imports:
  - axiom-official/axiom-agent-messages
